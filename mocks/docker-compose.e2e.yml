# Loopback WebAuthn override for the Playwright e2e suite.
#
# The normal dev stack advertises https://dev.crew.day /
# rp_id=dev.crew.day because that is the remote entry point. Playwright
# drives the same Vite container through http://localhost:8100, and
# WebAuthn requires the advertised RP ID to match the browser origin.
# Use localhost rather than an IP literal because Chromium rejects IP
# addresses as RP IDs during navigator.credentials.create().
services:
  app-api:
    environment:
      CREWDAY_PUBLIC_URL: "http://localhost:8100"
      CREWDAY_WEBAUTHN_RP_ID: "localhost"
      CREWDAY_RATE_LIMIT_ANONYMOUS_PER_MINUTE: "10000"
      CREWDAY_RATE_LIMIT_TOKEN_PER_MINUTE: "10000"
      CREWDAY_RATE_LIMIT_PERSONAL_ME_PER_MINUTE: "10000"
      # DEV / E2E ONLY — DO NOT enable in production (cd-xr652).
      # Disables the §04 iCal SSRF "private address" rejection so the
      # GA journey 3 test (cd-zxvk) can register a feed pointing at an
      # in-cluster ICS server. Every other validator gate (scheme,
      # DNS-rebind pin, same-origin redirects, body cap, timeout)
      # still applies. The default ``mocks/docker-compose.yml`` does
      # NOT set this knob — it only flips on for the e2e override.
      CREWDAY_ICAL_ALLOW_PRIVATE_ADDRESSES: "1"
      # DEV / E2E ONLY — DO NOT enable in production (cd-tblly).
      # Swaps the runtime LLMClient for the in-process
      # ``app.adapters.llm.fake.FakeLLMClient`` so GA journey 4
      # (cd-9cdn) can exercise expense autofill without an upstream
      # OpenRouter key. ``CREWDAY_LLM_OCR_MODEL`` is the deployment-
      # level capability gate inside ``_build_attach_runner``
      # (``app/api/v1/expenses.py``); both knobs must be set together
      # for attach-time autofill to fire. The model id is opaque to
      # the fake — any non-empty string clears the gate.
      CREWDAY_LLM_PROVIDER: "fake"
      CREWDAY_LLM_OCR_MODEL: "fake-ocr"
