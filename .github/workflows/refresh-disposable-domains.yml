# Weekly refresh of the bundled disposable-email-domain blocklist.
#
# Spec §15 "Self-serve abuse mitigations" (docs/specs/15-security-privacy.md):
#     "The bundled list MUST be refreshed weekly by a CI job
#      `refresh-disposable-domains.yml` that pulls from the pinned
#      upstream dataset, regenerates the in-repo file
#      (`app/abuse/data/disposable_domains.txt`), and opens a PR."
#
# The CI build also fails if the in-repo file is more than 30 days old
# (tests/unit/abuse/test_disposable_domains.py). This workflow keeps
# that gate green by opening a refresh PR every Monday — an operator
# reviews each PR before merge so a sudden upstream growth/shrink is
# noticed.
#
# Pinning policy:
#   The upstream repo (disposable-email-domains/disposable-email-domains)
#   does not ship semver tags, so we pin a specific commit SHA in
#   ``UPSTREAM_REF`` below. When this SHA is bumped, the next scheduled
#   run picks up the new dataset and opens a refresh PR. To roll the
#   pin manually:
#
#       git ls-remote https://github.com/disposable-email-domains/disposable-email-domains HEAD
#
#   then update ``UPSTREAM_REF`` with that SHA and let the next
#   schedule (or a manual ``workflow_dispatch``) regenerate the file.
#
# Initial pin source: ``git ls-remote … HEAD`` on 2026-05-02.

name: Refresh disposable-domain blocklist

on:
  schedule:
    # Monday 06:00 UTC — quiet enough to land before the workweek starts.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Don't kill an in-flight scheduled run if an operator triggers a
# manual refresh while it is still working — both should complete and
# the second simply opens nothing if the upstream set is unchanged.
concurrency:
  group: refresh-disposable-domains
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  # Upstream commit SHA on disposable-email-domains/disposable-email-domains.
  # See "Pinning policy" above for how to bump.
  UPSTREAM_REF: 166821e83de689ce70ac572d3381959b4fef9a48

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install deps
        run: uv sync --group dev

      - name: Fetch upstream blocklist (pinned SHA)
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/disposable-email-domains/disposable-email-domains/${UPSTREAM_REF}/disposable_email_blocklist.conf" \
            -o /tmp/upstream.conf
          wc -l /tmp/upstream.conf

      - name: Regenerate in-repo blocklist
        run: uv run python scripts/refresh_disposable_domains.py /tmp/upstream.conf

      - name: Verify freshness pin parses
        # Re-runs the unit gate so a malformed pin or truncated file
        # fails the workflow before a PR is opened.
        run: uv run pytest tests/unit/abuse/test_disposable_domains.py -x -q

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet -- app/abuse/data/disposable_domains.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "no upstream changes; nothing to PR"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            added=$(git diff --numstat -- app/abuse/data/disposable_domains.txt | awk '{print $1}')
            removed=$(git diff --numstat -- app/abuse/data/disposable_domains.txt | awk '{print $2}')
            echo "added=${added}" >> "$GITHUB_OUTPUT"
            echo "removed=${removed}" >> "$GITHUB_OUTPUT"
          fi

      - name: Open refresh PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          today=$(date -u +%Y-%m-%d)
          branch="refresh-disposable-domains-${today}-${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${branch}"
          git add app/abuse/data/disposable_domains.txt
          git commit -m "chore(abuse): refresh disposable-domain blocklist"
          git push -u origin "${branch}"
          gh pr create \
            --base main \
            --head "${branch}" \
            --title "chore(abuse): refresh disposable-domain blocklist" \
            --body "$(cat <<EOF
          Auto-generated by \`.github/workflows/refresh-disposable-domains.yml\`.

          - Upstream: \`disposable-email-domains/disposable-email-domains@${UPSTREAM_REF}\`
          - Diff (lines added / removed in \`app/abuse/data/disposable_domains.txt\`): +${{ steps.diff.outputs.added }} / -${{ steps.diff.outputs.removed }}
          - Pin bumped to \`# generated ${today}\`.

          Spec §15 "Self-serve abuse mitigations" requires a human reviewer
          on each refresh — **do not auto-merge**. Skim the diff for an
          unexpectedly large growth or shrink (which would suggest upstream
          drift), then merge if it looks reasonable.
          EOF
          )"
